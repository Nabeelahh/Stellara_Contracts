name: Contracts CI

on:
  pull_request:
    paths:
      - 'Contracts/**'
      - '.github/workflows/contracts.yml'
  push:
    branches: [main]
    paths:
      - 'Contracts/**'
      - '.github/workflows/contracts.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: 1.69.0
          override: true
      - run: cd Contracts && cargo test --all
